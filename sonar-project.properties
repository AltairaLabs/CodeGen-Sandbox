# SonarCloud configuration for codegen-sandbox.
#
# Organization:   altairalabs (on sonarcloud.io)
# Project key:    AltairaLabs_CodeGen-Sandbox (matches the GitHub repo name)
#
# To enable, the GitHub repo needs a SONAR_TOKEN secret. The CI job is
# structured to skip gracefully when that secret isn't set, so this file
# is safe to land before the project is provisioned on SonarCloud.
sonar.projectKey=AltairaLabs_CodeGen-Sandbox
sonar.organization=altairalabs

sonar.projectName=codegen-sandbox
sonar.projectVersion=0.1.0

# Single Go module. Source = cmd + internal. The Astro docs site under
# docs/ ships user-facing content only; it's not in scope for code
# quality analysis.
sonar.sources=cmd,internal
sonar.tests=cmd,internal
sonar.test.inclusions=**/*_test.go

# Paths are relative to the project root; exclusions apply to both
# analysis and coverage unless a narrower rule overrides.
sonar.exclusions=**/testdata/**,**/vendor/**,**/bin/**,**/docs/**,**/*.md,**/.git/**,**/*.pb.go,**/*.gen.go

# Go coverage — emitted by `go test -coverprofile=coverage.out` in CI.
sonar.go.coverage.reportPaths=coverage.out

# Coverage exclusions — code that is genuinely hard to unit-test from
# the current test surface. Keep this list short; add things here only
# when integration / e2e tests cover them instead.
#
# - cmd/sandbox/main.go            flag parsing + Run() delegation
# - cmd/sandbox-forward/main.go    subcommand dispatch
# - internal/api/docs.go           //go:embed + static HTML shell (Scalar CDN)
# - internal/tools/lspmock/main.go test-only LSP double spawned via
#                                  os.Executable re-exec from tests; it
#                                  runs in the CHILD process so coverage
#                                  collected by `go test` on the parent
#                                  test binary doesn't see it. Functionally
#                                  covered by every lsp_*_test.go via
#                                  behaviour (the handshake, definition,
#                                  references, and rename paths all run).
sonar.coverage.exclusions=cmd/sandbox/main.go,cmd/sandbox-forward/main.go,internal/api/docs.go,internal/tools/lspmock/main.go

# CPD (copy-paste) exclusions — test files have legit structural
# similarity (table-driven tests, httptest scaffolding).
sonar.cpd.exclusions=**/*_test.go

# Issue ignores — each rule-scope pair is justified below.
#
# e1: cmd/sandbox/run.go builds the shutdown grace context with
#     context.Background() AFTER the caller's ctx has already fired (that's
#     how we reached that code path). Using the parent ctx there would
#     give http.Server.Shutdown a pre-cancelled context and collapse the
#     grace window to zero. godre:S8239 doesn't distinguish
#     shutdown-handler detachment from accidental detachment.
# e2: internal/api/exec.go writes the final "exit" WS frame with a fresh
#     context.Background()-backed timeout so a parent-ctx cancellation
#     (sandbox shutdown) doesn't silently drop the terminal frame. Same
#     deliberate-detach pattern as run.go above; godre:S8239 doesn't see
#     the shutdown semantics.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=godre:S8239
sonar.issue.ignore.multicriteria.e1.resourceKey=cmd/sandbox/run.go
sonar.issue.ignore.multicriteria.e2.ruleKey=godre:S8239
sonar.issue.ignore.multicriteria.e2.resourceKey=internal/api/exec.go

# Quality gate check is handled by SonarSource/sonarqube-quality-gate-action
# in the CI workflow, which posts a summary comment on the PR.
