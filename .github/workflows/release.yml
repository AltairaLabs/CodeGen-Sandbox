name: Release

# Runs on `v*` tags (e.g. v0.1.0) and publishes:
#   - ghcr.io/altairalabs/codegen-sandbox-tools:<tag>
#   - ghcr.io/altairalabs/codegen-sandbox-tools:latest
#   - ghcr.io/altairalabs/codegen-sandbox:<tag>        (Go convenience image)
#   - ghcr.io/altairalabs/codegen-sandbox:latest
#
# Multi-arch: linux/amd64 + linux/arm64.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual tag override (when testing via workflow_dispatch)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  TOOLS_IMAGE: ghcr.io/altairalabs/codegen-sandbox-tools
  CONVENIENCE_IMAGE: ghcr.io/altairalabs/codegen-sandbox

jobs:
  publish:
    name: Build + push multi-arch images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push tools image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.TOOLS_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.TOOLS_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The Go convenience image's Dockerfile references the tools image by
      # a literal name (codegen-sandbox-tools:dev). In CI we redirect that
      # reference to the freshly-published multi-arch manifest via buildx
      # named contexts, so the convenience image pulls in whichever
      # architecture's tools layer it's building.
      - name: Build + push Go convenience image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.CONVENIENCE_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.CONVENIENCE_IMAGE }}:latest
          build-contexts: |
            codegen-sandbox-tools:dev=docker-image://${{ env.TOOLS_IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
