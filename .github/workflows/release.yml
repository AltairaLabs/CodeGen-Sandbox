name: Release

# Runs on `v*` tags (e.g. v0.1.0) and publishes:
#   - ghcr.io/altairalabs/codegen-sandbox-tools:<tag>
#   - ghcr.io/altairalabs/codegen-sandbox-tools:latest
#   - ghcr.io/altairalabs/codegen-sandbox:<tag>        (Go convenience image)
#   - ghcr.io/altairalabs/codegen-sandbox:latest
#
# Multi-arch: linux/amd64 + linux/arm64.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual tag override (when testing via workflow_dispatch)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  TOOLS_IMAGE: ghcr.io/altairalabs/codegen-sandbox-tools
  CONVENIENCE_IMAGE: ghcr.io/altairalabs/codegen-sandbox

jobs:
  publish:
    name: Build + push multi-arch images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push tools image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.TOOLS_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.TOOLS_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The Go convenience image's Dockerfile references the tools image by
      # a literal name (codegen-sandbox-tools:dev). In CI we redirect that
      # reference to the freshly-published multi-arch manifest via buildx
      # named contexts, so the convenience image pulls in whichever
      # architecture's tools layer it's building.
      - name: Build + push Go convenience image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.CONVENIENCE_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.CONVENIENCE_IMAGE }}:latest
          build-contexts: |
            codegen-sandbox-tools:dev=docker-image://${{ env.TOOLS_IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  forward-binaries:
    name: Build + publish sandbox-forward binaries
    runs-on: ubuntu-latest
    # Per-job scope: creating a Release asset needs contents:write, but the
    # Docker publish job above only needs the default contents:read.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Linux + macOS (amd64 + arm64) cover the common developer laptops;
        # windows/amd64 covers the remaining VS Code Remote-SSH install base.
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sandbox-forward (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          out="dist/sandbox-forward-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.tag.outputs.value }}" \
            -o "$out" \
            ./cmd/sandbox-forward

      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-forward-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sandbox-forward-*
          if-no-files-found: error
          retention-days: 7

  forward-release:
    name: Publish sandbox-forward to GitHub Release
    runs-on: ubuntu-latest
    needs: forward-binaries
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-staging

      - name: Assemble dist/ + checksums.txt
        run: |
          mkdir -p dist
          find dist-staging -type f -name 'sandbox-forward-*' -exec cp {} dist/ \;
          ls -la dist
          ( cd dist && sha256sum sandbox-forward-* > checksums.txt )
          cat dist/checksums.txt

      # softprops/action-gh-release is the de facto standard for attaching
      # assets to the tag-triggered GitHub Release; it skips gracefully when
      # run via workflow_dispatch against a non-tag ref.
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
