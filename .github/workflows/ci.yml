name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  GOLANGCI_LINT_VERSION: "v2.6.0"
  RIPGREP_VERSION: "14.1.0"
  NODE_VERSION: "22"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  go:
    name: Go test + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SonarCloud needs full git history for its blame-based new-code
          # detection; shallow clones yield incomplete PR-delta analysis.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ripgrep

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Verify toolchain
        run: |
          go version
          rg --version | head -1
          golangci-lint version

      - name: Build
        run: go build ./...

      - name: Test (with race detector + coverage)
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Lint
        run: make lint

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 5

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: go
    # Skip for forked PRs — secrets aren't exposed to them.
    if: github.event.pull_request.head.repo.fork != true && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: go-coverage

      - name: Rewrite coverage paths for SonarCloud
        # SonarCloud expects file paths relative to the project root; the
        # Go tooling writes them prefixed with the module path.
        run: sed -i 's|github.com/altairalabs/codegen-sandbox/||g' coverage.out

      - name: Check for SONAR_TOKEN
        id: sonar-check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN not configured; skipping SonarCloud scan. See docs/operations/sonarcloud.md to enable."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        if: steps.sonar-check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate check
        if: steps.sonar-check.outputs.skip != 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

  docker-tools:
    name: Dockerfile.tools build + artifact smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          push: false
          load: true
          tags: codegen-sandbox-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binaries
        run: |
          set -euo pipefail
          # --entrypoint override: Dockerfile.tools targets `scratch` and
          # deliberately has no CMD/ENTRYPOINT (it's an artifact source,
          # not a runtime image). `docker create` refuses images that
          # lack a command; overriding with /sandbox satisfies docker
          # without starting anything.
          docker create --name extract --entrypoint /sandbox codegen-sandbox-tools:ci
          docker cp extract:/sandbox /tmp/sandbox
          docker cp extract:/rg /tmp/rg
          docker rm extract
          chmod +x /tmp/sandbox /tmp/rg
          ls -lh /tmp/sandbox /tmp/rg
          /tmp/rg --version | head -1

      - name: Smoke — SSE handshake against extracted binary
        run: |
          set -euo pipefail
          mkdir -p /tmp/ws
          /tmp/sandbox -addr=127.0.0.1:18086 -workspace=/tmp/ws &
          SANDBOX_PID=$!
          trap 'kill $SANDBOX_PID 2>/dev/null || true' EXIT
          for i in 1 2 3 4 5; do
            if curl -sS -o /dev/null --max-time 1 http://127.0.0.1:18086/sse 2>/dev/null; then
              break
            fi
            sleep 1
          done
          curl -sS -N --max-time 2 --output sse.txt http://127.0.0.1:18086/sse || true
          head -c 200 sse.txt
          grep -q "event: endpoint" sse.txt

  docker-tools-go:
    name: Dockerfile.tools-go build + artifact smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools-go image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-go
          push: false
          load: true
          tags: codegen-sandbox-tools-go:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract + probe gopls
        run: |
          set -euo pipefail
          # --entrypoint override: Dockerfile.tools-go targets `scratch` and
          # deliberately has no CMD/ENTRYPOINT. docker create refuses images
          # without a command; overriding with /gopls satisfies that without
          # starting anything. We then docker cp both binaries out.
          docker create --name extract-go --entrypoint /gopls codegen-sandbox-tools-go:ci
          docker cp extract-go:/gopls /tmp/gopls
          docker cp extract-go:/golangci-lint /tmp/golangci-lint
          docker rm extract-go
          chmod +x /tmp/gopls /tmp/golangci-lint
          ls -lh /tmp/gopls /tmp/golangci-lint
          /tmp/gopls version
          /tmp/golangci-lint --version

  docker-tools-node:
    name: Dockerfile.tools-node build + artifact smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools-node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-node
          push: false
          load: true
          tags: codegen-sandbox-tools-node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract + probe pnpm + bun
        run: |
          set -euo pipefail
          # --entrypoint override: Dockerfile.tools-node targets `scratch` and
          # deliberately has no CMD/ENTRYPOINT. docker create refuses images
          # without a command; overriding with /pnpm satisfies that without
          # starting anything. We then docker cp both binaries out.
          docker create --name extract-node --entrypoint /pnpm codegen-sandbox-tools-node:ci
          docker cp extract-node:/pnpm /tmp/pnpm
          docker cp extract-node:/bun /tmp/bun
          docker rm extract-node
          chmod +x /tmp/pnpm /tmp/bun
          ls -lh /tmp/pnpm /tmp/bun
          /tmp/pnpm --version
          /tmp/bun --version

  docker-tools-python:
    name: Dockerfile.tools-python build + artifact smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools-python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-python
          push: false
          load: true
          tags: codegen-sandbox-tools-python:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract + probe ruff
        run: |
          set -euo pipefail
          # --entrypoint override: Dockerfile.tools-python targets `scratch`
          # and deliberately has no CMD/ENTRYPOINT. docker create refuses
          # images without a command; overriding with /ruff satisfies that
          # without starting anything. We then docker cp the binary out.
          docker create --name extract-python --entrypoint /ruff codegen-sandbox-tools-python:ci
          docker cp extract-python:/ruff /tmp/ruff
          docker rm extract-python
          chmod +x /tmp/ruff
          ls -lh /tmp/ruff
          /tmp/ruff --version

  docker-tools-rust:
    name: Dockerfile.tools-rust build + artifact smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools-rust image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-rust
          push: false
          load: true
          tags: codegen-sandbox-tools-rust:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract + probe rust-analyzer
        run: |
          set -euo pipefail
          # --entrypoint override: Dockerfile.tools-rust targets `scratch`
          # and deliberately has no CMD/ENTRYPOINT. docker create refuses
          # images without a command; overriding with /rust-analyzer
          # satisfies that without starting anything. We then docker cp
          # the binary out.
          docker create --name extract-rust --entrypoint /rust-analyzer codegen-sandbox-tools-rust:ci
          docker cp extract-rust:/rust-analyzer /tmp/rust-analyzer
          docker rm extract-rust
          chmod +x /tmp/rust-analyzer
          ls -lh /tmp/rust-analyzer
          /tmp/rust-analyzer --version

  docker-tools-render:
    name: Dockerfile.tools-render build + render smoke
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools-render image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-render
          push: false
          load: true
          tags: codegen-sandbox-tools-render:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Probe binaries (dot + mmdc) inside the image
        run: |
          set -euo pipefail
          # Unlike the other tools-* layers, tools-render is debian-based
          # (not scratch) — `dot` and `mmdc` both rely on dynamic libraries
          # / a Node + Chromium runtime that can't be transplanted. So we
          # verify by running the binaries inside the image instead of
          # extracting them to the host.
          docker run --rm --entrypoint dot  codegen-sandbox-tools-render:ci -V
          docker run --rm --entrypoint mmdc codegen-sandbox-tools-render:ci --version

      - name: Render smoke (mermaid → SVG, dot → SVG)
        run: |
          set -euo pipefail
          mkdir -p /tmp/render
          cat > /tmp/render/diagram.mmd <<'MMD'
          graph LR
            A[client] --> B[sandbox]
            B --> C[(workspace)]
          MMD
          cat > /tmp/render/graph.dot <<'DOT'
          digraph G { rankdir=LR; client -> sandbox -> workspace; }
          DOT
          # mermaid-cli needs --no-sandbox for Chromium (we're root inside
          # the container); the image ships a puppeteer config at
          # /opt/render/puppeteer-config.json wired via PUPPETEER_CONFIG.
          docker run --rm \
            -v /tmp/render:/work \
            --entrypoint mmdc \
            codegen-sandbox-tools-render:ci \
            -i /work/diagram.mmd -o /work/diagram.svg
          docker run --rm \
            -v /tmp/render:/work \
            --entrypoint dot \
            codegen-sandbox-tools-render:ci \
            -Tsvg /work/graph.dot -o /work/graph.svg
          ls -lh /tmp/render/diagram.svg /tmp/render/graph.svg
          # Sanity: both outputs should look like SVG, not empty / error html.
          # mermaid emits `<svg id="my-svg" ...` immediately; graphviz dot
          # leads with an XML prolog + DOCTYPE before the `<svg` opens, so
          # grep over the full file rather than a fixed prefix.
          grep -q '<svg' /tmp/render/diagram.svg
          grep -q '<svg' /tmp/render/graph.svg

  integration:
    name: Integration tests (real gopls + golangci-lint)
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Verify integration toolchain
        run: |
          go version
          gopls version
          golangci-lint --version

      - name: Run integration suite
        run: make test-integration

  e2e-smoke:
    name: End-to-end P0 tool chain (scripts/e2e-p0.sh)
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # The script exercises the full P0 tool surface against a real
      # bin/sandbox over the MCP HTTP+SSE wire. Required binaries on PATH:
      #   - bash / curl / jq / git — always present on ubuntu-latest.
      #   - go — from setup-go@v5 above.
      #   - gopls — installed here so the LSP steps (find_definition /
      #     find_references / rename_symbol) actually run instead of skipping.
      #   - ripgrep — installed via apt for the search_code step.
      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Verify e2e toolchain
        run: |
          go version
          gopls version
          rg --version | head -1
          jq --version
          curl --version | head -1

      - name: Build sandbox binary
        run: make build

      - name: Run e2e-p0.sh
        run: bash scripts/e2e-p0.sh

  e2e-multi-workspace:
    name: End-to-end multi-workspace dispatch (scripts/e2e-multi-workspace.sh)
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # The script needs only bash / curl / jq / go — no LSP or ripgrep
      # installs are required because the dispatch + tracker-isolation
      # assertions hit Read / Glob / Grep / Bash / Write only.
      - name: Verify toolchain
        run: |
          go version
          jq --version
          curl --version | head -1

      - name: Build sandbox binary
        run: make build

      - name: Run e2e-multi-workspace.sh
        run: bash scripts/e2e-multi-workspace.sh

  docker-integration:
    name: Docker image full-stack smoke
    runs-on: ubuntu-latest
    needs: [docker-tools, docker-tools-go]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build tools image (for compose)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          push: false
          load: true
          tags: codegen-sandbox-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build tools-go image (for compose)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools-go
          push: false
          load: true
          tags: codegen-sandbox-tools-go:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compose operator-style probe image
        run: |
          set -euo pipefail
          cat > Dockerfile.integration-probe <<'DOCKERFILE'
          FROM golang:1.25-alpine
          RUN apk add --no-cache bash git
          COPY --from=codegen-sandbox-tools:ci       /sandbox       /usr/local/bin/
          COPY --from=codegen-sandbox-tools:ci       /rg            /usr/local/bin/
          COPY --from=codegen-sandbox-tools-go:ci    /gopls         /usr/local/bin/
          COPY --from=codegen-sandbox-tools-go:ci    /golangci-lint /usr/local/bin/
          WORKDIR /workspace
          ENTRYPOINT ["/usr/local/bin/sandbox"]
          DOCKERFILE
          docker build -f Dockerfile.integration-probe -t codegen-sandbox-probe:ci .

      - name: Boot sandbox from probe image + assert tools/list
        run: |
          set -euo pipefail
          mkdir -p /tmp/probe-ws
          docker run -d --rm \
            --name codegen-probe \
            -p 127.0.0.1:18090:8080 \
            -v /tmp/probe-ws:/workspace \
            codegen-sandbox-probe:ci \
              -addr=0.0.0.0:8080 -workspace=/workspace
          trap 'docker stop codegen-probe 2>/dev/null || true' EXIT

          # Wait for listen
          for i in $(seq 1 20); do
            if curl -sS -o /dev/null --max-time 1 http://127.0.0.1:18090/sse; then
              break
            fi
            sleep 1
          done

          # Open SSE + capture the session endpoint
          SSE_FILE=$(mktemp)
          curl -sS -N --max-time 10 --output "$SSE_FILE" http://127.0.0.1:18090/sse &
          SSE_PID=$!
          for i in $(seq 1 30); do
            if grep -q '^data: /message' "$SSE_FILE"; then break; fi
            sleep 0.3
          done
          SESSION=$(grep -o '^data: /message.*' "$SSE_FILE" | head -1 \
                    | sed 's|^data: *||' | tr -d '\r\n ')
          test -n "$SESSION" || { tail -40 "$SSE_FILE" >&2; exit 1; }

          # Initialize
          curl -sS -X POST "http://127.0.0.1:18090$SESSION" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"docker-integration","version":"0"},"capabilities":{}}}' \
            >/dev/null
          curl -sS -X POST "http://127.0.0.1:18090$SESSION" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
            >/dev/null

          # tools/list — assert the P0 tools are registered
          curl -sS -X POST "http://127.0.0.1:18090$SESSION" \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            >/dev/null

          # Wait for the response to land in the SSE stream
          for i in $(seq 1 40); do
            if grep -q '"id":2,' "$SSE_FILE"; then break; fi
            sleep 0.3
          done
          RESP=$(grep -o '^data: {"jsonrpc":"2.0","id":2,.*' "$SSE_FILE" | tail -1 | sed 's|^data: *||')
          test -n "$RESP" || { tail -40 "$SSE_FILE" >&2; exit 1; }

          echo "$RESP" | head -c 2000
          echo

          # Every P0 tool must be present in the list.
          for t in snapshot_create snapshot_list snapshot_restore snapshot_diff \
                   last_test_failures search_code edit_function_body \
                   insert_after_method change_function_signature \
                   find_definition find_references rename_symbol; do
            if ! echo "$RESP" | grep -q "\"$t\""; then
              echo "tools/list missing expected tool: $t" >&2
              exit 1
            fi
            echo "  ✓ $t present"
          done

          kill "$SSE_PID" 2>/dev/null || true
